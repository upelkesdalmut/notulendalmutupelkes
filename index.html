<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Notulen App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .animate-fade-out {
            animation: fadeOut 0.5s ease-in forwards;
        }
        /* Penyesuaian scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // KONFIGURASI API KEY GEMINI (SUDAH DIISI)
        // ==========================================
        // API Key ini yang akan digunakan untuk memanggil AI saat di-hosting di Vercel/GitHub/Sites
        const apiKey = "AIzaSyC376AD2FAbkMR08QWxcp6MdppE0qsFe5I"; 

        // ==========================================
        // KONFIGURASI FIREBASE UNTUK GOOGLE SITES
        // ==========================================
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // GANTI BAGIAN INI DENGAN CONFIG FIREBASE ANDA SENDIRI JIKA DI GOOGLE SITES / VERCEL
            // Didapat dari Firebase Console -> Project Settings -> General -> Web App
            // Jika belum diisi, fitur "Riwayat Cloud" tidak akan tersimpan, tetapi fitur utama "Buat Notulen" tetap berjalan.
            firebaseConfig = {
                apiKey: "ISI_API_KEY_FIREBASE_ANDA",
                authDomain: "project-id.firebaseapp.com",
                projectId: "project-id",
                storageBucket: "project-id.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abcdef"
            };
        }

        const appFirebase = initializeApp(firebaseConfig);
        const auth = getAuth(appFirebase);
        const db = getFirestore(appFirebase);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ai-notulen-app';

        // Komponen Notifikasi Toast
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(() => {
                    onClose();
                }, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';

            return (
                <div className={`fixed top-5 right-5 ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center space-x-3 z-50 animate-slide-in`}>
                    <i className={`fas ${icon} text-xl`}></i>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('buat');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [user, setUser] = useState(null);

            // Inisialisasi Auth Firebase
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Error authentication:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);

            return (
                <div className="flex h-screen bg-gray-50 font-sans text-gray-800 relative">
                    {/* Mobile overlay */}
                    {isSidebarOpen && (
                        <div 
                            className="fixed inset-0 bg-black/50 z-20 md:hidden"
                            onClick={() => setIsSidebarOpen(false)}
                        ></div>
                    )}

                    {/* Sidebar */}
                    <aside className={`fixed md:relative w-64 h-full bg-slate-900 text-white flex flex-col transition-transform duration-300 shadow-xl z-30 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-6 flex items-center justify-between md:justify-start space-x-3 border-b border-slate-800">
                            <div className="flex items-center space-x-3">
                                <img src="https://d2s1u1uyrl4yfi.cloudfront.net/diskes/logo/55206c41fa9907cd50415d55a7023ba2.png" alt="Logo Upelkes" className="h-10 w-auto bg-white rounded-md p-1 shadow-md" />
                                <h1 className="text-xl font-bold tracking-wide">AI NOTULEN</h1>
                            </div>
                            <button className="md:hidden text-slate-400 hover:text-white" onClick={toggleSidebar}>
                                <i className="fas fa-times text-2xl"></i>
                            </button>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={() => { setActiveTab('buat'); setIsSidebarOpen(false); }} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${activeTab === 'buat' ? 'bg-indigo-600 text-white shadow-md transform scale-[1.02]' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i className="fas fa-file-alt text-[20px] w-6"></i>
                                <span className="font-medium">Buat Notulen</span>
                            </button>
                            <button onClick={() => { setActiveTab('riwayat'); setIsSidebarOpen(false); }} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${activeTab === 'riwayat' ? 'bg-indigo-600 text-white shadow-md transform scale-[1.02]' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i className="fas fa-history text-[20px] w-6"></i>
                                <span className="font-medium">Riwayat Cloud</span>
                            </button>
                            <button onClick={() => { setActiveTab('aktivitasi'); setIsSidebarOpen(false); }} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${activeTab === 'aktivitasi' ? 'bg-indigo-600 text-white shadow-md transform scale-[1.02]' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i className="fas fa-shield-halved text-[20px] w-6"></i>
                                <span className="font-medium">Lisensi Pro</span>
                            </button>
                        </nav>
                        
                        <div className="p-4 text-xs text-slate-500 text-center border-t border-slate-800">
                            &copy; 2026 AI Notulen Pro<br/>Sistem Google Sites
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50/50">
                        {/* Mobile Header */}
                        <header className="md:hidden bg-white shadow-sm border-b border-slate-200 p-4 flex items-center">
                            <button onClick={toggleSidebar} className="text-slate-600 hover:text-slate-900 focus:outline-none">
                                <i className="fas fa-bars text-2xl"></i>
                            </button>
                            <h2 className="ml-4 text-lg font-bold text-slate-800">AI Notulen App</h2>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-0">
                            {activeTab === 'buat' && <BuatNotulenTab user={user} db={db} />}
                            {activeTab === 'riwayat' && <RiwayatTab user={user} db={db} />}
                            {activeTab === 'aktivitasi' && <AktivitasiTab />}
                        </div>
                    </main>
                </div>
            );
        }

        function BuatNotulenTab({ user, db }) {
            const [formData, setFormData] = useState({
                tanggal: '', waktu: '', waktuSelesai: '', tempat: '', tema: '', notulis: '', deskripsi: ''
            });
            const [isSampaiSelesai, setIsSampaiSelesai] = useState(false);
            const [showDescription, setShowDescription] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [result, setResult] = useState('');
            const [error, setError] = useState('');
            const [toast, setToast] = useState(null);
            const descriptionRef = useRef(null);

            useEffect(() => {
                if (formData.tema.length > 2 && !showDescription) {
                    setShowDescription(true);
                    setTimeout(() => descriptionRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
                }
            }, [formData.tema, showDescription]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const generateWithGemini = async () => {
                if (!formData.tanggal || !formData.waktu || (!formData.waktuSelesai && !isSampaiSelesai) || !formData.tempat || !formData.tema || !formData.deskripsi) {
                    setError("Mohon lengkapi semua form wajib.");
                    return;
                }
                
                setError('');
                setIsGenerating(true);
                setResult('');

                let tanggalFormatPrompt = '';
                if(formData.tanggal) {
                    tanggalFormatPrompt = new Date(formData.tanggal).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                }

                const promptText = `
Instruksi: Anda adalah sekretaris dan analis profesional di instansi resmi. Tulis notulen dengan sangat mendalam, panjang, dan terperinci.

Data Kegiatan (Harap jadikan acuan dalam menyusun narasi notulen):
- Nama Kegiatan / Tema: ${formData.tema}
- Tanggal Pelaksanaan: ${tanggalFormatPrompt}
- Waktu: Pukul ${formData.waktu} WIB s/d ${isSampaiSelesai ? 'Selesai' : formData.waktuSelesai + ' WIB'}
- Tempat: ${formData.tempat}
- Notulis: ${formData.notulis || 'Tim Sekretariat'}
- Poin Pembahasan / Catatan Kasar: ${formData.deskripsi}

Format Penulisan (Mulai langsung dari poin 1):

### 1. Latar Belakang
(Buat latar belakang yang sangat komprehensif, profesional, dan logis dengan penjelasan mendalam terkait urgensi kegiatan ini, minimal 2 paragraf)

### 2. Tujuan
(Sebutkan minimal 3-4 poin tujuan spesifik yang dijabarkan dengan jelas)

### 3. Ringkasan Pelaksanaan
(Ceritakan alur kegiatan secara naratif dari awal hingga akhir dengan sangat detail, mengacu pada poin pembahasan di atas, sebutkan juga waktu dan tempat pelaksanaan, minimal 3-4 paragraf panjang)

### 4. Hasil Kegiatan
(Jabarkan temuan utama, pencapaian, analisis keadaan di lapangan, kendala, atau masalah secara ekstensif dan mendalam)

### 5. Kesimpulan
(Berikan poin-poin kesimpulan akhir yang komprehensif)

### 6. Tindak Lanjut
(Sebutkan beberapa poin langkah konkret ke depan pasca kegiatan, tanpa menyisakan titik-titik isian kosong)

### 7. Penutup
(Berikan paragraf penutup formal yang baku dan lengkap)

PENTING: Gunakan bahasa Indonesia baku, sangat formal, dan diksi profesional. Jangan membuat format KOP SURAT atau Header Kegiatan di teks ini, fokus pada isinya saja (Kop akan dibuat otomatis oleh sistem Word).
                `;

                const payload = {
                    contents: [{ parts: [{ text: promptText }] }]
                };

                const maxRetries = 5;
                const delays = [1000, 2000, 4000, 8000, 16000];
                let attempt = 0;
                let success = false;
                let generatedText = null;
                let lastErrorMsg = '';

                // MENGGUNAKAN MODEL GEMINI 1.5 FLASH (Model Paling Stabil untuk API Key Publik)
                const modelVersion = "gemini-1.5-flash";
                const endpointUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelVersion}:generateContent?key=${apiKey.trim()}`;

                while (attempt < maxRetries && !success) {
                    try {
                        const response = await fetch(endpointUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            const data = await response.json();
                            generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (generatedText) {
                                success = true;
                                break;
                            } else {
                                throw new Error("Respons kosong dari server AI.");
                            }
                        } else {
                            const errorData = await response.json().catch(() => ({}));
                            throw new Error(errorData.error?.message || response.statusText);
                        }
                    } catch (err) {
                        lastErrorMsg = err.message;
                        attempt++;
                        if (attempt < maxRetries) {
                            await new Promise(res => setTimeout(res, delays[attempt - 1]));
                        }
                    }
                }

                if (success) {
                    setResult(generatedText);
                    
                    // Simpan ke Firebase Cloud secara otomatis
                    if (user && db && firebaseConfig.apiKey !== "ISI_API_KEY_FIREBASE_ANDA") {
                        try {
                            const notulenRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notulen');
                            await addDoc(notulenRef, {
                                tema: formData.tema,
                                tanggal: formData.tanggal,
                                waktu: formData.waktu,
                                waktuSelesai: formData.waktuSelesai,
                                tempat: formData.tempat,
                                notulis: formData.notulis,
                                deskripsi: formData.deskripsi,
                                result: generatedText,
                                createdAt: Date.now()
                            });
                            setToast({ message: "Berhasil: Notulen tersimpan di Cloud Firebase!", type: "success" });
                        } catch (firebaseErr) {
                            console.error("Gagal menyimpan ke Firebase:", firebaseErr);
                            setToast({ message: "Gagal menyimpan ke Cloud. Pastikan Config valid.", type: "error" });
                        }
                    } else {
                        // Tidak menampilkan error toast untuk firebase config agar tidak mengganggu jika hanya butuh AI
                    }
                } else {
                    setError(`Gagal mengakses AI. Kesalahan: ${lastErrorMsg}`);
                }
                
                setIsGenerating(false);
            };

            const copyToClipboard = () => {
                const textArea = document.createElement("textarea");
                textArea.value = result;
                textArea.style.position = "absolute";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setToast({ message: "Teks berhasil disalin!", type: "success" });
                } catch (err) {
                    setToast({ message: "Gagal menyalin teks.", type: "error" });
                }
                document.body.removeChild(textArea);
            };

            // Menggunakan Data URI sebagai alternatif download agar tidak diblokir iFrame Google Sites
            const downloadWordDataUrl = () => {
                if (!result) return;
                
                let htmlContent = result.split('\n').map(line => line.trim()).filter(line => line.length > 0).map(line => {
                    let p = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    if (p.startsWith('### ')) return `<h3 style="font-family: 'Times New Roman', serif; font-size: 12pt; font-weight: bold; margin-top: 12pt; margin-bottom: 2pt;">${p.replace('### ', '')}</h3>`;
                    if (p.startsWith('## ')) return `<h2 style="font-family: 'Times New Roman', serif; font-size: 12pt; font-weight: bold; margin-top: 12pt; margin-bottom: 2pt;">${p.replace('## ', '')}</h2>`;
                    if (p.startsWith('# ')) return `<h1 style="font-family: 'Times New Roman', serif; font-size: 12pt; font-weight: bold; margin-top: 12pt; margin-bottom: 2pt;">${p.replace('# ', '')}</h1>`;
                    if (p.startsWith('- ') || p.startsWith('* ')) return `<p style="font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 150%; margin-top: 0; margin-bottom: 0; margin-left: 36pt; text-indent: -18pt; text-align: justify;">&bull;&nbsp;&nbsp;&nbsp;&nbsp;${p.substring(2)}</p>`;
                    const matchNumber = p.match(/^(\d+\.) (.*)/);
                    if (matchNumber) return `<p style="font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 150%; margin-top: 0; margin-bottom: 0; margin-left: 36pt; text-indent: -18pt; text-align: justify;">${matchNumber[1]}&nbsp;&nbsp;&nbsp;&nbsp;${matchNumber[2]}</p>`;
                    return `<p style="font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 150%; margin-top: 4pt; margin-bottom: 6pt; text-align: justify;">${p}</p>`;
                }).join('');

                const waktuAkhir = isSampaiSelesai ? 'Selesai' : `${formData.waktuSelesai} WIB`;
                let tanggalFormat = '';
                if(formData.tanggal) {
                    tanggalFormat = new Date(formData.tanggal).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                }

                const headerHtml = `
                    <html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset='utf-8'><title>Notulen Kegiatan</title>
                        <style>
                            body { font-family: 'Times New Roman', serif; font-size: 12pt; color: black; }
                            table { font-family: 'Times New Roman', serif; font-size: 12pt; }
                            .title { text-align: center; font-weight: bold; font-size: 12pt; margin-top: 12pt; margin-bottom: 12pt; text-decoration: underline; }
                            .info-table { width: 100%; border-collapse: collapse; margin-bottom: 12pt; }
                            .info-table td { padding: 0; padding-bottom: 2pt; vertical-align: top; line-height: 150%; }
                            .info-table td:first-child { width: 110pt; font-weight: bold; }
                        </style>
                    </head>
                    <body>
                        <hr style="border: none; border-top: 3px solid black; margin-top: 8pt; margin-bottom: 2pt;" />
                        <hr style="border: none; border-top: 1px solid black; margin-top: 0; margin-bottom: 0;" />
                        <div class="title">NOTULEN</div>
                        <table class="info-table">
                            <tr><td>Kegiatan</td><td>:</td><td>${formData.tema || '-'}</td></tr>
                            <tr><td>Hari / Tanggal</td><td>:</td><td>${tanggalFormat || '-'}</td></tr>
                            <tr><td>Waktu</td><td>:</td><td>Pukul ${formData.waktu} WIB s/d ${waktuAkhir}</td></tr>
                            <tr><td>Tempat</td><td>:</td><td>${formData.tempat || '-'}</td></tr>
                        </table>
                        ${htmlContent}
                    </body>
                    </html>
                `;

                // Gunakan Data URI untuk mendownload file tanpa menggunakan Blob URL
                const dataUri = 'data:application/msword;charset=utf-8,' + encodeURIComponent(headerHtml);
                const link = document.createElement('a');
                link.href = dataUri;
                link.download = `Notulen_${formData.tema.substring(0, 15).replace(/[^a-zA-Z0-9]/g, '_')}.doc`;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setToast({ message: "Dokumen berhasil diunduh!", type: "success" });
            };

            const formatTextUI = (text) => {
                if (!text) return null;
                return text.split('\n').map((line, i) => {
                    if (line.startsWith('### ')) return <h3 key={i} className="text-xl font-bold mt-5 mb-2 text-slate-800">{line.replace('### ', '')}</h3>;
                    if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) return <li key={i} className="ml-6 list-disc mb-1" dangerouslySetInnerHTML={{ __html: line.trim().substring(2).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') }} />;
                    const formattedLine = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    return line.trim() === '' ? <br key={i} /> : <p key={i} className="mb-2 leading-relaxed" dangerouslySetInnerHTML={{ __html: formattedLine }} />;
                });
            };

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto pb-20">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    <header className="mb-8">
                        <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">Buat Notulen Kegiatan</h2>
                        <p className="text-slate-500 mt-2 text-lg">AI Terintegrasi langsung untuk Google Sites.</p>
                    </header>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Kegiatan <span className="text-red-500">*</span></label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-calendar-alt text-slate-400"></i></div>
                                    <input type="date" name="tanggal" value={formData.tanggal} onChange={handleInputChange} className="pl-10 w-full rounded-xl border border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Waktu Kegiatan <span className="text-red-500">*</span></label>
                                <div className="flex items-start space-x-2">
                                    <div className="relative flex-1">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-clock text-slate-400"></i></div>
                                        <input type="time" name="waktu" value={formData.waktu} onChange={handleInputChange} className="pl-10 w-full rounded-xl border border-slate-300 bg-slate-50 py-3 px-3 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                    </div>
                                    <span className="text-slate-400 font-semibold text-sm mt-3">s/d</span>
                                    <div className="flex flex-col flex-1">
                                        <div className="relative w-full">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-clock text-slate-400"></i></div>
                                            <input type="time" name="waktuSelesai" value={formData.waktuSelesai} onChange={handleInputChange} disabled={isSampaiSelesai} className={`pl-10 w-full rounded-xl border border-slate-300 py-3 px-3 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all ${isSampaiSelesai ? 'bg-slate-200 opacity-60 cursor-not-allowed' : 'bg-slate-50'}`} />
                                        </div>
                                        <label className="flex items-center space-x-2 mt-2 cursor-pointer text-sm text-slate-600">
                                            <input type="checkbox" checked={isSampaiSelesai} onChange={(e) => setIsSampaiSelesai(e.target.checked)} className="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4" />
                                            <span className="font-medium">Sampai Selesai</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Tempat <span className="text-red-500">*</span></label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-map-marker-alt text-slate-400"></i></div>
                                    <input type="text" name="tempat" value={formData.tempat} onChange={handleInputChange} placeholder="Misal: Ruang Rapat Lt. 2" className="pl-10 w-full rounded-xl border border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Tema / Nama Kegiatan <span className="text-red-500">*</span></label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-tag text-slate-400"></i></div>
                                    <input type="text" name="tema" value={formData.tema} onChange={handleInputChange} placeholder="Tema kegiatan" className="pl-10 w-full rounded-xl border border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                </div>
                            </div>
                        </div>

                        <div className={`transition-all duration-700 overflow-hidden ${showDescription ? 'max-h-[800px] opacity-100 mt-6' : 'max-h-0 opacity-0'}`}>
                            <div className="mb-6 pt-6 border-t border-slate-100">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Notulis (Opsional)</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-users text-slate-400"></i></div>
                                    <input type="text" name="notulis" value={formData.notulis} onChange={handleInputChange} placeholder="Nama Anda" className="pl-10 w-full rounded-xl border border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                </div>
                            </div>
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Deskripsi Pelaksanaan <span className="text-red-500">*</span></label>
                            <div className="relative">
                                <div className="absolute top-3 left-3 pointer-events-none"><i className="fas fa-align-left text-slate-400"></i></div>
                                <textarea ref={descriptionRef} name="deskripsi" value={formData.deskripsi} onChange={handleInputChange} placeholder="Ceritakan alur kegiatan, poin-poin yang dibahas, dan hasil secara garis besar..." rows="4" className="pl-10 w-full rounded-xl border border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none resize-none transition-all"></textarea>
                            </div>
                        </div>

                        {error && (
                            <div className="mt-6 p-4 bg-red-50 text-red-600 rounded-xl border border-red-200 text-sm flex items-start space-x-2 animate-fade-in-up">
                                <i className="fas fa-exclamation-triangle mt-0.5"></i><span>{error}</span>
                            </div>
                        )}

                        <div className="mt-8 flex justify-end">
                            <button onClick={generateWithGemini} disabled={isGenerating || !showDescription} className={`flex items-center space-x-2 px-8 py-3.5 rounded-xl font-bold text-white transition-all shadow-md ${isGenerating || !showDescription ? 'bg-indigo-300 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 active:scale-95'}`}>
                                {isGenerating ? <><i className="fas fa-spinner animate-spin"></i><span>Memproses AI...</span></> : <><i className="fas fa-wand-magic-sparkles"></i><span>Buat Notulen</span></>}
                            </button>
                        </div>
                    </div>

                    {result && (
                        <div className="bg-white rounded-2xl shadow-lg border border-indigo-100 p-6 md:p-8 animate-fade-in-up">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b border-slate-100 pb-5">
                                <h3 className="text-2xl font-bold text-slate-800 flex items-center space-x-2"><i className="fas fa-check-circle text-green-500"></i><span>Hasil Notulen</span></h3>
                                <div className="flex flex-wrap gap-3 w-full md:w-auto">
                                    <button onClick={copyToClipboard} className="flex-1 md:flex-none flex justify-center items-center space-x-2 text-sm font-semibold text-indigo-700 bg-indigo-50 hover:bg-indigo-100 px-4 py-2.5 rounded-lg border border-indigo-100 transition-colors"><i className="fas fa-copy"></i><span>Salin Teks</span></button>
                                    <button onClick={downloadWordDataUrl} className="flex-1 md:flex-none flex justify-center items-center space-x-2 text-sm font-bold text-white bg-green-600 hover:bg-green-700 px-6 py-2.5 rounded-lg shadow-md transition-colors"><i className="fas fa-download"></i><span>Download Word</span></button>
                                </div>
                            </div>
                            <div className="text-sm text-slate-600 mb-6 bg-blue-50/50 p-4 rounded-xl border border-blue-100 flex items-start space-x-3">
                                <span className="text-xl">💡</span>
                                <p>Jika tombol <b>Download Word</b> diblokir oleh perizinan Google Sites, gunakan tombol <b>Salin Teks</b> lalu paste ke Microsoft Word komputer Anda.</p>
                            </div>
                            <div className="text-slate-800 bg-slate-50 p-6 md:p-8 rounded-xl border border-slate-200 font-serif leading-relaxed shadow-inner overflow-x-auto">
                                {formatTextUI(result)}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- TAB BARU: RIWAYAT CLOUD FIREBASE ---
        function RiwayatTab({ user, db }) {
            const [riwayatList, setRiwayatList] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!user || !db || (typeof __firebase_config === 'undefined' && db._app.options.apiKey === "ISI_API_KEY_FIREBASE_ANDA")) {
                    setLoading(false);
                    return;
                }

                const notulenRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notulen');
                
                // Mengambil data dan mensortirnya di Memory Client
                const unsubscribe = onSnapshot(notulenRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    data.sort((a, b) => b.createdAt - a.createdAt);
                    setRiwayatList(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Gagal mengambil data dari Firebase:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user, db]);

            const hapusNotulen = async (id) => {
                if(confirm("Apakah Anda yakin ingin menghapus arsip notulen ini?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'notulen', id));
                    } catch (error) {
                        console.error("Gagal menghapus:", error);
                    }
                }
            };

            const downloadDariRiwayat = (item) => {
                const dataUri = 'data:application/msword;charset=utf-8,' + encodeURIComponent(`
                    <html><head><meta charset='utf-8'></head>
                    <body>
                        <h3>Notulen: ${item.tema}</h3>
                        <p>Tanggal: ${item.tanggal}</p>
                        <p>Tempat: ${item.tempat}</p>
                        <hr/>
                        <pre style="font-family: sans-serif; white-space: pre-wrap;">${item.result}</pre>
                    </body></html>
                `);
                const link = document.createElement('a');
                link.href = dataUri;
                link.download = `Riwayat_Notulen_${item.tema.substring(0, 15)}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Tampilkan Pesan Peringatan jika belum mengatur konfigurasi saat berada di Google Sites
            if (typeof __firebase_config === 'undefined' && (!db || db._app.options.apiKey === "ISI_API_KEY_FIREBASE_ANDA")) {
                return (
                    <div className="p-8 max-w-4xl mx-auto text-center mt-20">
                        <i className="fas fa-cloud-exclamation text-[60px] text-slate-300 mb-6"></i>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Cloud Storage Belum Dikonfigurasi</h2>
                        <p className="text-slate-500">Silakan masukkan Config Firebase Anda di dalam baris kode HTML (Baris 40) agar fitur penyimpanan Riwayat dapat berfungsi sepenuhnya di dalam Google Sites.</p>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto pb-20">
                    <header className="mb-8">
                        <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">Riwayat Cloud</h2>
                        <p className="text-slate-500 mt-2 text-lg">Notulen yang telah Anda buat otomatis tersimpan di Cloud.</p>
                    </header>

                    {loading ? (
                        <div className="text-center py-10"><i className="fas fa-spinner animate-spin text-3xl text-indigo-500"></i></div>
                    ) : riwayatList.length === 0 ? (
                        <div className="bg-white rounded-2xl border border-slate-200 p-10 text-center shadow-sm">
                            <i className="fas fa-folder-open text-5xl text-slate-300 mb-4"></i>
                            <h3 className="text-xl font-bold text-slate-700">Belum ada riwayat</h3>
                            <p className="text-slate-500 mt-2">Buat notulen pertama Anda dan sistem akan otomatis menyimpannya ke Cloud.</p>
                        </div>
                    ) : (
                        <div className="grid gap-4">
                            {riwayatList.map(item => (
                                <div key={item.id} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div>
                                        <h4 className="font-bold text-lg text-slate-800">{item.tema}</h4>
                                        <p className="text-sm text-slate-500"><i className="fas fa-calendar-alt mr-2"></i> {item.tanggal} &nbsp;|&nbsp; <i className="fas fa-map-marker-alt mx-2"></i> {item.tempat}</p>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button onClick={() => downloadDariRiwayat(item)} className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg font-semibold hover:bg-indigo-100 transition-colors">
                                            <i className="fas fa-download md:mr-2"></i><span className="hidden md:inline">Download</span>
                                        </button>
                                        <button onClick={() => hapusNotulen(item.id)} className="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-red-100 transition-colors">
                                            <i className="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function AktivitasiTab() {
            const [kode, setKode] = useState('');
            const [status, setStatus] = useState('free');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleAktivasi = (e) => {
                e.preventDefault();
                if (!kode) return;
                setLoading(true);
                setMessage('');
                
                setTimeout(() => {
                    if (kode.toUpperCase() === 'PRO2026') {
                        setStatus('premium');
                        setMessage('Aktivasi berhasil! Lisensi Pro sekarang aktif.');
                    } else {
                        setMessage('Kode aktivasi tidak valid. (Hint: gunakan PRO2026)');
                    }
                    setLoading(false);
                    setKode('');
                }, 1500);
            };

            return (
                <div className="p-4 md:p-8 max-w-3xl mx-auto">
                    <header className="mb-10 text-center">
                        <div className="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 rounded-full mb-4 shadow-inner">
                            <i className="fas fa-shield-halved text-[40px] text-indigo-600 mt-2"></i>
                        </div>
                        <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">Aktivitasi Lisensi</h2>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className={`p-8 rounded-2xl border-2 transition-all duration-300 flex flex-col items-center justify-center ${status === 'premium' ? 'bg-indigo-50 border-indigo-500 shadow-lg' : 'bg-white border-slate-200 shadow-sm'}`}>
                            <h3 className="text-lg font-bold text-slate-700 mb-4 text-center">Status Akun</h3>
                            {status === 'premium' ? (
                                <div className="flex flex-col items-center text-center py-4 animate-fade-in-up">
                                    <i className="fas fa-check-circle text-[48px] text-indigo-500 mb-3"></i>
                                    <h4 className="text-3xl font-black text-indigo-700 tracking-tight">PREMIUM</h4>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center text-center py-4">
                                    <div className="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mb-3"><span className="text-slate-500 font-bold text-lg">Free</span></div>
                                    <h4 className="text-3xl font-black text-slate-700 tracking-tight">GRATIS</h4>
                                </div>
                            )}
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                            <form onSubmit={handleAktivasi}>
                                <div className="mb-6">
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Kode Aktivasi</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fas fa-key text-[20px] text-slate-400"></i></div>
                                        <input type="text" value={kode} onChange={(e) => setKode(e.target.value)} placeholder="Masukkan 12-digit kode..." disabled={status === 'premium'} className={`pl-10 w-full rounded-xl border-slate-300 border py-3.5 px-4 text-slate-700 outline-none uppercase font-mono font-bold focus:ring-2 focus:ring-indigo-500 ${status === 'premium' ? 'bg-slate-100 cursor-not-allowed' : 'bg-slate-50'}`} />
                                    </div>
                                </div>
                                {message && (
                                    <div className={`mb-4 p-3 rounded-lg text-sm text-center font-medium animate-fade-in-up ${status === 'premium' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                        {message}
                                    </div>
                                )}
                                <button type="submit" disabled={loading || !kode || status === 'premium'} className={`w-full flex items-center justify-center space-x-2 py-3.5 rounded-xl font-bold text-white shadow-md transition-all ${loading || !kode || status === 'premium' ? 'bg-slate-300 cursor-not-allowed' : 'bg-slate-900 hover:bg-slate-800 active:scale-95'}`}>
                                    {loading ? <i className="fas fa-spinner animate-spin text-[20px]"></i> : <i className="fas fa-check-circle text-[20px]"></i>}
                                    <span>{status === 'premium' ? 'Sudah Aktif' : 'Aktivasi'}</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
